name: Monthly monday audit

on:
  schedule:
    # GitHub cron is UTC. 08:00 Europe/Bucharest is typically 05:00 UTC (summer) or 06:00 UTC (winter).
    # Pick one; adjust if you want a fixed local time.
    - cron: "0 5 1 * *"
  workflow_dispatch:
    inputs:
      no_date_filter:
        description: "Run without order date filter (debug)"
        required: false
        default: "false"

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Run audit
        env:
          NODE_ENV: production
          APP_TIMEZONE: Europe/Bucharest
          APP_VERSION: 1.0.0

          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_API_URL: ${{ secrets.MONDAY_API_URL }}
          MONDAY_API_VERSION: ${{ secrets.MONDAY_API_VERSION }}

          ORDERS_BOARD_ID: ${{ secrets.ORDERS_BOARD_ID }}
          REQUESTS_BOARD_ID: ${{ secrets.REQUESTS_BOARD_ID }}
          REQUESTS2_BOARD_ID: ${{ secrets.REQUESTS2_BOARD_ID }}

          SEND_EMPTY_REPORT: ${{ secrets.SEND_EMPTY_REPORT }}
          ATTACH_REPORT_ON_EMPTY: ${{ secrets.ATTACH_REPORT_ON_EMPTY }}
          REPORT_OUTPUT_DIR: ./output

          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}

          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_CC: ${{ secrets.MAIL_CC }}
          MAIL_BCC: ${{ secrets.MAIL_BCC }}

          LOG_LEVEL: info
        run: |
          if [ "${{ github.event.inputs.no_date_filter }}" = "true" ]; then
            npm run audit:once -- --no-date-filter
          else
            npm run audit:once
          fi

      - name: Upload report artifacts (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-output
          path: output/*.xlsx
          if-no-files-found: ignore
